<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >
    <title>Rust Hot Reload Demo - Bevy Web</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d1320;
        }

        body {
            font-family: "Segoe UI", sans-serif;
        }

        #bevy {
            width: 100vw;
            height: 100vh;
            display: block;
            touch-action: none;
        }
    </style>
</head>
<body>
<canvas id="bevy"></canvas>
<link data-trunk rel="rust" href="Cargo.toml" data-bin="game-shell">
<link data-trunk rel="copy-file" href="reload-trigger.txt">
<script>
window.addEventListener("error", (event) => {
    console.error("window.error", event.message, event.error);
});

window.addEventListener("unhandledrejection", (event) => {
    console.error("unhandledrejection", event.reason);
});

window.addEventListener("TrunkApplicationStarted", (event) => {
    console.log("TrunkApplicationStarted", event.detail);
});

console.log("index.html loaded; canvas =", document.getElementById("bevy"));
</script>
</body>
</html>
